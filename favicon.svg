<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo negro -->
  <rect width="512" height="512" rx="80" fill="#080c12"/>
  
  <!-- Letra A en azul -->
  <text x="256" y="360" 
    font-family="Montserrat, Arial Black, sans-serif" 
    font-size="340" 
    font-weight="900" 
    fill="#3B82F6" 
    text-anchor="middle">A</text>
  
  <!-- Líneas de circuito saliendo de la A -->
  <line x1="330" y1="95" x2="370" y2="55" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <line x1="370" y1="55" x2="420" y2="55" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <circle cx="420" cy="55" r="8" fill="#60A5FA"/>
  
  <line x1="350" y1="120" x2="390" y2="80" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
  <line x1="390" y1="80" x2="440" y2="80" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
  <circle cx="440" cy="80" r="6" fill="#60A5FA"/>
  
  <line x1="310" y1="85" x2="340" y2="40" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <circle cx="340" cy="40" r="5" fill="#3B82F6"/>
</svg>
